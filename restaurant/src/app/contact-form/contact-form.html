<form class="contact_form" action="">
    <div class="name_container">
        <input type="text" name="first_name" placeholder="Meno" required>
        <input type="text" name="last_name" placeholder="Priezvisko" required>
    </div>

    <input type="email" name="email" placeholder="E-mail" required>
    <textarea name="message" placeholder="Správa..." rows="5" required></textarea>

    <button type="submit" class="send">Odoslať správu</button>
</form>
