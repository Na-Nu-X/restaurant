<section class="all_dishes">
    <article class="one_dish" *ngFor="let dish of dishes">
        <div class="rating">
            <i class="fa-solid fa-star"></i> 4,3 <!-- https://fontawesome.com/icons/star -->
        </div>

        <img src="images/{{ dish.image }}" alt="">

        <p class="title">{{ dish.title }}</p>
        <p class="description">{{ dish.description }}</p>

        <div class="bottom">
            <p class="price">{{ (dish.price / 100) | currency:'EUR':'':'1.2-2':'sk-SK' }}<span>€</span></p>
            <button class="add_to_cart" title="Pridať do košíka" aria-label="Pridať do košíka" (click)="addToCart(dish)"><i class="fa-solid fa-basket-shopping"></i> Pridať</button> <!-- https://fontawesome.com/icons/basket-shopping -->
        </div>
    </article>
</section>
