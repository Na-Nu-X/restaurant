<nav class="navigation_bar">
    <div class="navigation_container">
        <button class="hamburger" (click)="toggleMenu()">
            <i class="fa-solid" [class.fa-bars]="!is_open" [class.fa-xmark]="is_open"></i> <!-- https://fontawesome.com/icons/bars / https://fontawesome.com/icons/magnifying-glass -->
        </button>
    
        <ul [class.open]="is_open">
            <li><a href="#">Domov</a></li>
            <li><a href="#">Rezervácia</a></li>
            <li (click)="scrollTo('.all_dishes')"><a>Menu</a></li>
        </ul>

        <div class="cart">
            <p class="amount">{{ cart_amount$ | async }}</p>

            <button class="show_cart" title="Zobraziť košík" aria-label="Zobraziť košík" (click)="showCart()">
                <i class="fa-solid fa-basket-shopping"></i> <!-- https://fontawesome.com/icons/basket-shopping -->
            </button>
        </div>
    </div>
</nav>

<dialog #cart class="cart_modal">
    <div class="top">
        <h2>Môj košík</h2>

        <button class="close" title="Zavrieť" aria-label="Zavrieť" (click)="closeCart()">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>

    <div class="middle">
        <p class="empty_message" *ngIf="!cart_items || cart_items.length === 0">Košík je prázdny.</p>

        <div class="all_items" *ngIf="cart_items && cart_items.length > 0" [style.transform]="'translateX(calc(' + (-current_index * 100) + '% + ' + (current_index * 20) + 'px))'">
            <div class="one_item" *ngFor="let one_item of cart_items; let i = index" (click)="changeCartItem(i)">
                <img src="images/{{ one_item.image }}" alt="">

                <p class="title">{{ one_item.title }}</p>

                <div class="bottom">
                    <p class="price">{{ (one_item.price / 100) | currency:'EUR':'':'1.2-2':'sk-SK' }}<span>€</span></p>
                    <button class="remove_from_cart" title="Odstrániť z košíka" aria-label="Odstrániť z košíka" (click)="removeFromCart(i)"><i class="fa-solid fa-basket-shopping"></i> Odstrániť</button> <!-- https://fontawesome.com/icons/basket-shopping -->
                </div>
            </div>
        </div>

        <div class="bars" *ngIf="cart_items && cart_items.length > 1">
            <div 
                class="one_bar" 
                *ngFor="let item of cart_items; let i = index"
                [class.active]="current_index === i"
                (click)="changeCartItem(i)">
            </div>
        </div>
    </div>

    <div class="bottom" title="Platba" aria-label="Platba" *ngIf="cart_items && cart_items.length > 0">
        <button class="checkout" title="Pokračovať k platbe" aria-label="Pokračovať k platbe">Zaplatiť <p class="total_price">{{ (total_price / 100) | currency:'EUR':'':'1.2-2':'sk-SK' }}<span>€</span></p></button>
    </div>
</dialog>
